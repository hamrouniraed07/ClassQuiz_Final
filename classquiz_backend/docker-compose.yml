services:
  # ── MongoDB 
  mongo:
    image: mongo:7.0
    container_name: classquiz-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: classquiz
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - classquiz-internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── AI Service (Python / FastAPI) 
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
      target: production
    container_name: classquiz-ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    environment:
      - PORT=8000
      - ENV=production
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:3b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - classquiz-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy

  # ── Web API (Node.js / Express) 
  web-api:
    build:
      context: ./web-api
      dockerfile: Dockerfile
      target: production
    container_name: classquiz-web-api
    restart: unless-stopped
    env_file:
      - ./web-api/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/classquiz
      - AI_SERVICE_URL=http://ai-service:8000
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - classquiz-internal
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── WhatsApp Agent 
  whatsapp-agent:
    build:
      context: ./whatsapp-agent
      dockerfile: Dockerfile
      target: production
    container_name: classquiz-whatsapp-agent
    restart: unless-stopped
    env_file:
      - ./whatsapp-agent/.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/classquiz
      - CLASSQUIZ_API_URL=http://web-api:3000
    ports:
      - "4000:4000"   # exposé pour recevoir les webhooks Meta
    volumes:
      # Partage le même volume que web-api
      # L'agent écrit dans uploads/incoming/ → ClassQuiz lit depuis uploads/
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - classquiz-internal
    depends_on:
      mongo:
        condition: service_healthy
      web-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


  # ── WAHA (WhatsApp HTTP API) 
  waha:
    image: devlikeapro/waha
    container_name: classquiz-waha
    restart: unless-stopped
    environment:
      - WHATSAPP_API_KEY=change_this_secret
      - WHATSAPP_DEFAULT_ENGINE=NOWEB        # ← changer WEBJS → NOWEB
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=classquiz2024
    ports:
      - "3001:3000"
    volumes:
      - waha_data:/app/.sessions
    networks:
      - classquiz-internal

  # ── Mongo Express (Dev) 
  mongo-express:
    image: mongo-express:1.0.2
    container_name: classquiz-mongo-express
    restart: unless-stopped
    profiles:
      - dev
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: classquiz_dev_2024
    ports:
      - "8081:8081"
    networks:
      - classquiz-internal
    depends_on:
      - mongo

networks:
  classquiz-internal:
    driver: bridge
    internal: false

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local   # partagé entre web-api et whatsapp-agent
  logs_data:
    driver: local
  waha_data:        # ← ajouter cette ligne
    driver: local  
